<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/styles.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>

    <!-- top bar -->
    <div class="container-fluid py-1 border-bottom">
        <div class="d-flex mx-5 justify-content-between ">
            <div class="d-flex align-items-center gap-3">
                <a class="text-muted" href="#">Help</a>
                <small class="text-muted">/</small>
                <a class="text-muted" href="#">Support</a>
                <small class="text-muted">/</small>
                <a class="text-muted" href="#">Contact</a>
            </div>

            <div class="d-flex align-items-center">
                <a class="text-muted" href="tel:1234567890">Call Us:(+012) 1234 567890</a>
            </div>

            <div class="d-flex  align-items-center">

                <div class="btn-group">
                    <button type="button" class="btn  border-0 dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        USD
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">INR</a></li>
                    </ul>
                </div>


                <div class="btn-group">
                    <button type="button" class="btn  border-0 dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        English
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Tamil</a></li>
                        <li><a class="dropdown-item" href="#">Hindi</a></li>
                    </ul>
                </div>

                <div class="btn-group align-items-center">
                    <i class="bi bi-house"></i>
                    <button type="button" class="btn  border-0 dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        My Dashboard
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Settings</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- middle bar -->
    <div class="container-fluid py-4">
        <div class="d-flex mx-5 justify-content-between ">
            <div class="logo">
                <a href="#">
                    <img src="assets/img/logo.png" style="width: 200px;">
                </a>
            </div>

            <div class="d-flex align-items-center">
                <div class="input-group">
                    <input type="text" class="border left-side px-5 py-3" placeholder="Search Looking For?">
                    <button type="button" class="btn rounded-0 border dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        All Category
                    </button>
                    <div class="d-flex align-items-center right-side border">
                        <div class="">
                            <button type="button" class="search-btn rounded-pill border-0 py-3 px-5">
                                <i class="bi bi-search"></i>
                            </button>
                            
                        </div>

                    </div>

                </div>
            </div>


            <div class="d-flex align-items-center gap-2">
                <div class="icon-style">
                    <i class="bi bi-shuffle text-secondary"></i>
                </div>

                <div class="icon-style">
                    <i class="bi bi-heart-fill text-secondary"></i>
                </div>

                <div class="icon-style">
                    <i class="bi bi-cart-fill text-secondary"></i>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg nav-bg">
        <div class="container-fluid py-3">

        </div>
    </nav>
















    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
